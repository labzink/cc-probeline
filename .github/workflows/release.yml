name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  # Keyless build provenance attestation (BL-37): OIDC token + attestation store.
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: tests
        run: go test ./... -count=1

      - name: goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: 'v2.16.0'
          args: release --clean
        env:
          # GITHUB_TOKEN publishes the GitHub Release in this repo.
          # TAP_GITHUB_TOKEN is a PAT with write access to the homebrew-tap and
          # scoop-bucket repos (cross-repo push for the brews/scoops blocks).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      # BL-37: keyless build provenance for the release archives. Runs after
      # goreleaser has populated dist/. Verifiable with:
      #   gh attestation verify <file> --repo labzink/cc-probeline
      - name: attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
