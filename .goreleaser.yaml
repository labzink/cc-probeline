# GoReleaser config — cc-probeline
# Phase 7.0: minimal valid skeleton. The full 5-target build matrix, archives,
# checksums, brews/scoops blocks are added in 7.a / 7.c.
#
# Pinned tool channel (use the same in CI / 7.b):
#   go run github.com/goreleaser/goreleaser/v2@v2.16.0 check
version: 2

project_name: cc-probeline

before:
  hooks:
    - go mod tidy

# Explicit SCM target: the internal R&D repo has no git remote (it mirrors to the
# public repo, where releases actually run). Declaring it explicitly keeps
# `goreleaser check` valid regardless of the local remote.
release:
  github:
    owner: labzink
    name: cc-probeline

builds:
  - id: cc-probeline
    main: ./cmd/cc-probeline/
    binary: cc-probeline
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # windows/arm64 is not a target (5 platforms, not 6).
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.buildDate={{ .Date }}

archives:
  - id: cc-probeline
    ids:
      - cc-probeline
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Homebrew tap (macOS/Linux). goreleaser v2 publishes a cask (the old `brews`
# formula key is deprecated). On a real tagged release goreleaser pushes the
# cask to labzink/homebrew-tap using TAP_GITHUB_TOKEN (a PAT with write access
# to that repo). On --snapshot it only renders the cask into dist/.
homebrew_casks:
  - name: cc-probeline
    repository:
      owner: labzink
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/labzink/cc-probeline"
    description: "Status line plugin for Claude Code — model, tokens, cost, subagents"
    # Lifecycle hooks so `brew install` is a one-step setup (parity with curl /
    # scoop — see docs/superpowers/specs/2026-06-17-universal-channel-lifecycle).
    hooks:
      post:
        # 1) BL-39: the binary is not Apple-notarized, so the cask download
        #    carries com.apple.quarantine and Gatekeeper blocks it ("cannot
        #    verify the developer", zsh: killed). Strip it FIRST — before we run
        #    the binary below, or that invocation would itself be killed.
        # 2) Wire the Claude Code status line to the STABLE bin symlink (not the
        #    versioned Caskroom path, so `brew upgrade` never breaks it).
        #    --if-absent never clobbers an existing status line and exits 0, so
        #    a fresh install just works while an upgrade is a no-op.
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/cc-probeline"]
          end
          system_command "#{staged_path}/cc-probeline",
                         args: ["install", "--merge-settings",
                                "--binary-path", "#{HOMEBREW_PREFIX}/bin/cc-probeline",
                                "--if-absent"]
          ohai "cc-probeline: restart Claude Code to load the status line."
      pre:
        # Restore the user's previous status line before the binary is removed.
        uninstall: |
          system_command "#{staged_path}/cc-probeline", args: ["uninstall"]

# Scoop bucket (Windows). Pushes the manifest to labzink/scoop-bucket on a real
# release; renders into dist/ on --snapshot.
scoops:
  - name: cc-probeline
    repository:
      owner: labzink
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/labzink/cc-probeline"
    description: "Status line plugin for Claude Code — model, tokens, cost, subagents"
    license: MIT
    # Wire the Claude Code status line on install (parity with curl / brew).
    # Invoke the versioned binary but write the STABLE `current` shim path into
    # settings so `scoop update` never breaks the wiring. --if-absent never
    # clobbers an existing status line. NOTE: goreleaser scoops has no uninstall
    # hook, so `scoop uninstall` does NOT auto-restore the previous status line —
    # run `cc-probeline uninstall` first (documented in README). UNVERIFIED until
    # a Windows hands-on.
    post_install:
      - '$stable = Join-Path (Split-Path $dir -Parent) "current\cc-probeline.exe"'
      - '& "$dir\cc-probeline.exe" install --merge-settings --binary-path $stable --if-absent'
      - 'Write-Host "cc-probeline: restart Claude Code to load the status line."'
