# GoReleaser config — cc-probeline
# Phase 7.0: minimal valid skeleton. The full 5-target build matrix, archives,
# checksums, brews/scoops blocks are added in 7.a / 7.c.
#
# Pinned tool channel (use the same in CI / 7.b):
#   go run github.com/goreleaser/goreleaser/v2@v2.16.0 check
version: 2

project_name: cc-probeline

before:
  hooks:
    - go mod tidy

# Explicit SCM target: the internal R&D repo has no git remote (it mirrors to the
# public repo, where releases actually run). Declaring it explicitly keeps
# `goreleaser check` valid regardless of the local remote.
release:
  github:
    owner: labzink
    name: cc-probeline

builds:
  - id: cc-probeline
    main: ./cmd/cc-probeline/
    binary: cc-probeline
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # windows/arm64 is not a target (5 platforms, not 6).
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.buildDate={{ .Date }}

archives:
  - id: cc-probeline
    ids:
      - cc-probeline
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

# Homebrew tap (macOS/Linux). goreleaser v2 publishes a cask (the old `brews`
# formula key is deprecated). On a real tagged release goreleaser pushes the
# cask to labzink/homebrew-tap using TAP_GITHUB_TOKEN (a PAT with write access
# to that repo). On --snapshot it only renders the cask into dist/.
homebrew_casks:
  - name: cc-probeline
    repository:
      owner: labzink
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/labzink/cc-probeline"
    description: "Status line plugin for Claude Code — model, tokens, cost, subagents"

# Scoop bucket (Windows). Pushes the manifest to labzink/scoop-bucket on a real
# release; renders into dist/ on --snapshot.
scoops:
  - name: cc-probeline
    repository:
      owner: labzink
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/labzink/cc-probeline"
    description: "Status line plugin for Claude Code — model, tokens, cost, subagents"
    license: MIT
